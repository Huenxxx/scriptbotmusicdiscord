name: Auto Release Binaries

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Download FFmpeg for Windows
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri "https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-win64-gpl.zip" -OutFile ffmpeg.zip
          Expand-Archive ffmpeg.zip -DestinationPath ffmpeg_temp
          Get-ChildItem -Path ffmpeg_temp -Filter ffmpeg.exe -Recurse | Copy-Item -Destination .
          Remove-Item ffmpeg.zip
          Remove-Item -Recurse ffmpeg_temp

      - name: Compile with PyInstaller
        run: |
          pyinstaller --name="ScriptBot Studio" --windowed --noconfirm main.py

      - name: Bundle ffmpeg to dist
        shell: pwsh
        run: |
          Copy-Item ffmpeg.exe -Destination "dist/ScriptBot Studio/"

      - name: Create Portable ZIP
        shell: pwsh
        run: |
          Compress-Archive -Path "dist/ScriptBot Studio" -DestinationPath "dist/ScriptBot_Studio_Windows_Portable.zip"

      - name: Compile Setup Installer
        shell: pwsh
        run: |
          $iss = @"
          [Setup]
          AppName=ScriptBot Studio
          AppVersion=1.0.0
          DefaultDirName={userappdata}\\Programs\\ScriptBot Studio
          DefaultGroupName=ScriptBot Studio
          UninstallDisplayIcon={app}\\ScriptBot Studio.exe
          Compression=lzma2
          SolidCompression=yes
          OutputDir=dist
          OutputBaseFilename=ScriptBot_Studio_Windows_Setup
          DisableWelcomePage=no
          DisableDirPage=no
          DisableProgramGroupPage=yes

          [Files]
          Source: "dist\\ScriptBot Studio\\*"; DestDir: "{app}"; Flags: recursesubdirs createallsubdirs

          [Icons]
          Name: "{group}\\ScriptBot Studio"; Filename: "{app}\\ScriptBot Studio.exe"
          Name: "{userdesktop}\\ScriptBot Studio"; Filename: "{app}\\ScriptBot Studio.exe"
          "@
          Set-Content -Path setup.iss -Value $iss -Encoding utf8
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" setup.iss

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-binaries
          path: |
            dist/ScriptBot_Studio_Windows_Portable.zip
            dist/ScriptBot_Studio_Windows_Setup.exe

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install system dependencies for GUI
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-tk

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Download FFmpeg for Linux
        run: |
          wget https://johnvansickle.com/ffmpeg/releases/ffmpeg-release-amd64-static.tar.xz
          tar -xf ffmpeg-release-amd64-static.tar.xz
          find . -name ffmpeg -type f -executable -exec cp {} . \;
          rm ffmpeg-release-amd64-static.tar.xz

      - name: Compile with PyInstaller
        run: |
          pyinstaller --name="ScriptBot Studio" --windowed --noconfirm main.py

      - name: Bundle ffmpeg to dist
        run: |
          cp ffmpeg "dist/ScriptBot Studio/"

      - name: Create Portable Tarball
        run: |
          cd dist
          tar -czf ScriptBot_Studio_Linux_Portable.tar.gz "ScriptBot Studio"

      - name: Create Linux Installer script
        run: |
          cat << 'EOF' > dist/install.sh
          #!/bin/bash
          set -e
          INSTALL_DIR="$HOME/.local/share/scriptbot-studio"
          echo "Instalando ScriptBot Studio en $INSTALL_DIR..."
          mkdir -p "$INSTALL_DIR"
          cp -r "ScriptBot Studio"/* "$INSTALL_DIR/"
          chmod +x "$INSTALL_DIR/ScriptBot Studio"
          
          # Crear lanzador de escritorio
          LAUNCHER_DIR="$HOME/.local/share/applications"
          mkdir -p "$LAUNCHER_DIR"
          cat << EOL > "$LAUNCHER_DIR/scriptbot-studio.desktop"
          [Desktop Entry]
          Name=ScriptBot Studio
          Comment=Discord Music Bot Manager
          Exec="$INSTALL_DIR/ScriptBot Studio"
          Icon=utilities-terminal
          Terminal=false
          Type=Application
          Categories=Utility;
          EOL
          
          chmod +x "$LAUNCHER_DIR/scriptbot-studio.desktop"
          echo "¡Instalación completada con éxito! Puedes ejecutarlo desde el menú de aplicaciones."
          EOF
          chmod +x dist/install.sh

      - name: Create Installer Tarball
        run: |
          cd dist
          tar -czf ScriptBot_Studio_Linux_Installer.tar.gz install.sh "ScriptBot Studio"

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-binaries
          path: |
            dist/ScriptBot_Studio_Linux_Portable.tar.gz
            dist/ScriptBot_Studio_Linux_Installer.tar.gz

  release:
    needs: [build-windows, build-linux]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: windows-binaries
          path: dist

      - name: Download Linux artifacts
        uses: actions/download-artifact@v4
        with:
          name: linux-binaries
          path: dist

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/ScriptBot_Studio_Windows_Portable.zip
            dist/ScriptBot_Studio_Windows_Setup.exe
            dist/ScriptBot_Studio_Linux_Portable.tar.gz
            dist/ScriptBot_Studio_Linux_Installer.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
